{% extends "layout/base.html" %}

{% block title %} 
Gender List 
{% endblock title %}

{% block 'content' %}
{% include "include/Sidebar.html" %}
{% include "include/ToastMessage.html" %}

<div class="p-4 sm:ml-64 mt-16 md:mt-14">
  <div class="relative overflow-x-auto rounded-sm shadow-sm"> 
    <table class="w-full">
        <thead class="text-xs text-left text-white bg-blue-600">
            <tr>

                <th class="px-6 py-3">Gender</th>
                <th class="px-6 py-3">Action</th>
            <tr>
        </thead>
        <tbody class="text-s text-white">
            {% for gender in genders  %}
             <tr class="transition-colors duration-400 hover:bg-indigo-900 border-b border-gray-200">
                
                 <td class="px-6 py-3">{{ gender.gender }}</td>
                 <td class="px-6 py-3 ">
                    <div class="inline-flex shadow-sm">
                        <a href="/gender/edit/{{ gender.gender_id }}" class="bg-indigo-600 px-3 py-2.5 font-medium text-sm text-white rounded-s-sm hover:bg-green-500 transition-colors duration-400
                        hover:outline-1">Edit</a>
                        <a href="/gender/delete/{{ gender.gender_id }}" class="bg-indigo-900 px-3 py-2.5 font-medium text-sm text-white rounded-e-sm hover:bg-red-600 transition-colors duration-400
                        hover:outline-1">Delete</a>
                    </div>
                 </td>
             </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

{% endblock 'content' %}
