{% extends "layout/base.html" %}

{% block title %} Edit Gender Page {% endblock title %}

{% block 'content' %}
{% include "include/Sidebar.html" %}
{% include "include/ToastMessage.html" %}

<div class="p-4 sm:ml-64 mt-16 md:mt-14">
    <form action="/gender/edit/{{ gender.gender_id }}" method="post">
        {% csrf_token %}
        <div class="mx-auto w-full md:w-96 mb-4">
           <label for="gender" class="block text-sm text-white font-medium mb-2">Gender</label>
           <input type="text" class="bg-white mb-2 px-28 py-2.5 border border-gray-300 text-black block text-sm rounded-sm w-full>
           focus:outline-none focus:ring-blue-600 focus:border-blue-600" name="gender" id="gender" value="{{ gender.gender }}" />
           <div class="flex justify-end mt-4">
             <a href="/gender/list" class="bg-indigo-900 transition-colors duration-400 hover:bg-red-700 text-sm font-medium text-white px-3 py-2.5 mr-1 rounded-b-sm shadow-sm cursor-pointer
              hover:outline-none">Back </a>
             <button type="submit" class="bg-indigo-600 transition-colors duration-400 hover:bg-green-700 text-sm font-medium text-white px-3 py-2.5 rounded-sm 
             shadow-sm cursor-pointer hover:outline-none">Save Gender</button>
           </div>
        </div>
    </form>
</div>

{% endblock 'content' %}
