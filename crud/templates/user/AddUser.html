{% extends "layout/base.html" %}

{% block 'title' %} Add User {% endblock 'title' %}

{% block 'content' %}

{% include "include/sidebar.html" %}
{% include "include/ToastMessage.html" %}


<div class='p-2 sm:ml-64 mt-16 md:mt-14'>
    <div class="mx-auto">
        <div class="grid grid-cols-2 gap-4">
            <form action="/user/add" method="post">
              {% csrf_token %}
              <div class="col-span-2 md:col-span-1">
                <div class="cpl-span-1">
                    <div class="mb-4"> 
                      <label for="full_name" class='block text-sm font-medium mb-2 text-white'>Full Name</label>
                      <input type="text" class='bg-white mb-2 px-3 py-2.5 border border-gray-300 text-black block text-sm rounded-sm w-full 
                      focus:outline-none focus:ring-blue-600 focus:border-blue-600' name="full_name" id="full_name" />
                    </div>
                    <div class="mb-4">
                      <label for="gender" class='block text-sm font-medium mb-2 text-white'>Gender</label>
                      <select name="gender" id="gender" class="bg-white mb-2 px-3 py-2.5 border border-gray-300 text-black block text-sm rounded-sm 
                      w-full focus:outline-none focus:ring-blue-600 focus:border-blue-600">
                        <option value="">Select Gender</option>
                        {% for gender in genders %}
                        
                         <option value="{{ gender.gender_id }}"> {{ gender.gender }} </option>
                        
                        {% endfor %}
                      </select>
                    </div>
                    <div class="mb-4">
                        <label for="birth_date" class="block text-sm font-medium mb-2 text-white">Birth Date</label>
                        <input type="date" class="bg-white mb-2 px-3 py-2.5 border border-gray-300 text-black block text-sm rounded-sm w-full
                        focus:outline-none focus:ring-blue-600 focus:border-blue-600" name="birth_date" id="birth_date" />
                    </div>
                    <div class="mb-4"> 
                      <label for="address" class='block text-sm font-medium mb-2 text-white'>Address</label>
                      <input type="text" class='bg-white mb-2 px-3 py-2.5 border border-gray-300 text-black block text-sm rounded-sm w-full 
                      focus:outline-none focus:ring-blue-600 focus:border-blue-600' name="address" id="address" />
                    </div>
                    <div class="mb-4"> 
                      <label for="contact_number" class='block text-sm font-medium mb-2 text-white'>Contact Number</label>
                      <input type="text" class='bg-white mb-2 px-3 py-2.5 border border-gray-300 text-black block text-sm rounded-sm w-full 
                      focus:outline-none focus:ring-blue-600 focus:border-blue-600' name="contact_number" id="contact_number" />
                    </div>
                 <div>
                <div class="col-span-2 md:col-span-1 w-full">
                  <div class="mb-4"> 
                    <label for="email" class='block text-sm font-medium mb-2 text-white'>Email</label>
                    <input type="email" class='bg-white mb-2 px-3 py-2.5 border border-gray-300 text-black block text-sm rounded-sm w-full 
                    focus:outline-none focus:ring-blue-600 focus:border-blue-600' name="email" id="email" />
                  </div>
                  <div class="mb-4"> 
                    <label for="username" class='block text-sm font-medium mb-2 text-white'>Username</label>
                    <input type="text" class='bg-white mb-2 px-3 py-2.5 border border-gray-300 text-black block text-sm rounded-sm w-full 
                    focus:outline-none focus:ring-blue-600 focus:border-blue-600' name="username" id="username" />
                  </div>
                  <div class="mb-4"> 
                    <label for="password" class='block text-sm font-medium mb-2 text-white'>Password</label>
                    <input type="password" class='bg-white mb-2 px-3 py-2.5 border border-gray-300 text-black block text-sm rounded-sm 
                    w-full focus:outline-none focus:ring-blue-600 focus:border-blue-600' name="password" id="password" />
                  </div>
                  <div class="mb-4"> 
                    <label for="confirm_password" class='block text-sm font-medium mb-2 text-white'>Confirm Password</label>
                    <input type="password" class='bg-white mb-2 px-3 py-2.5 border border-gray-300 text-black block text-sm rounded-sm w-full 
                    focus:outline-none focus:ring-blue-600 focus:border-blue-600' name="confirm_password" id="confirm_password" />
                  </div>
              </div>
              <div class='flex justify-end'>
                <button type='submit' class='bg-indigo-600 transition-colors duration-400 hover:bg-green-700 text-sm font-medium text-white px-3 py-2.5 rounded-sm
                shadow-sm cursor-pointer '>Save User</button>
              </div>
            </form>
        </div>
    </div>
</div>

{% endblock 'content' %}
